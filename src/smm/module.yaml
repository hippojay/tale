code: smm
name: "SMM: TALE Literature Development"
header: "TALE: The Author's Literary Engine"
subheader: "AI-driven framework for fiction and non-fiction writing with specialized literary agents"
default_selected: true

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_title:
  prompt: "What is the title of your writing project?"
  default: "{directory_name}"
  result: "{value}"

project_type:
  prompt:
    - "What type of writing project are you working on?"
    - "This affects which agents and workflows are most relevant."
  default: "novel"
  result: "{value}"
  single-select:
    - value: "novel"
      label: "Novel - Full-length fiction work"
    - value: "novella"
      label: "Novella - Shorter fiction work (20k-50k words)"
    - value: "short_story"
      label: "Short Story - Brief fiction work (under 20k words)"
    - value: "non_fiction"
      label: "Non-Fiction - Memoir, biography, self-help, etc."
    - value: "screenplay"
      label: "Screenplay - Script for film or television"
    - value: "stage_play"
      label: "Stage Play - Script for theater"
    - value: "musical_theatre"
      label: "Musical Theatre - Book, lyrics, and song placement for a stage musical"

musical_theatre_style:
  prompt:
    - "What style of musical are you writing? (Only relevant for musical theatre projects)"
  default: "book_musical"
  result: "{value}"
  single-select:
    - value: "book_musical"
      label: "Book Musical - Story-driven with integrated songs and scenes (Les Misérables, Hamilton, Fun Home)"
    - value: "concept_musical"
      label: "Concept Musical - Theme or idea-driven rather than linear narrative (Company, A Chorus Line, Cabaret)"
    - value: "jukebox_musical"
      label: "Jukebox Musical - Built around pre-existing songs (Mamma Mia!, Jersey Boys)"
    - value: "revue"
      label: "Revue - Loosely connected songs without sustained narrative"
    - value: "chamber_musical"
      label: "Chamber Musical - Intimate scale, small cast, minimal staging (The Band's Visit, tick tick... BOOM!)"
    - value: "rock_musical"
      label: "Rock Musical - Rock/pop score driving dramatic storytelling (Spring Awakening, Rent, Hadestown)"
    - value: "sung_through"
      label: "Sung-Through - Minimal or no spoken dialogue; story told entirely in song (Hamilton, Les Misérables)"

primary_genre:
  prompt: "What is the primary genre of your work?"
  default: "literary_fiction"
  result: "{value}"
  single-select:
    - value: "literary_fiction"
      label: "Literary Fiction - Character-driven, artistic prose"
    - value: "commercial_fiction"
      label: "Commercial Fiction - Plot-driven, mainstream appeal"
    - value: "romance"
      label: "Romance - Love story with happy ending"
    - value: "mystery"
      label: "Mystery/Thriller - Suspense and investigation"
    - value: "science_fiction"
      label: "Science Fiction - Futuristic or speculative elements"
    - value: "fantasy"
      label: "Fantasy - Magical or supernatural elements"
    - value: "historical"
      label: "Historical Fiction - Set in the past"
    - value: "young_adult"
      label: "Young Adult - Targeted at teen readers"
    - value: "memoir"
      label: "Memoir - Personal life story"
    - value: "biography"
      label: "Biography - Someone else's life story"
    - value: "self_help"
      label: "Self-Help - Instructional/motivational"
    - value: "other"
      label: "Other - Specify in project notes"

target_word_count:
  prompt: "What is your target word count?"
  default: "80000"
  result: "{value}"
  single-select:
    - value: "5000"
      label: "Short Story (5k words)"
    - value: "15000"
      label: "Long Short Story (15k words)"
    - value: "30000"
      label: "Novella (30k words)"
    - value: "60000"
      label: "Short Novel (60k words)"
    - value: "80000"
      label: "Standard Novel (80k words)"
    - value: "100000"
      label: "Long Novel (100k words)"
    - value: "custom"
      label: "Custom - Specify in project notes"

writing_experience:
  prompt:
    - "What is your writing experience level?"
    - "This affects how agents explain concepts and provide guidance."
  default: "intermediate"
  result: "{value}"
  single-select:
    - value: "beginner"
      label: "Beginner - New to creative writing, need detailed guidance"
    - value: "intermediate"
      label: "Intermediate - Some writing experience, balance guidance with efficiency"
    - value: "experienced"
      label: "Experienced - Seasoned writer, focus on advanced techniques"
    - value: "professional"
      label: "Professional - Published author, minimal explanation needed"

prose_sophistication:
  prompt:
    - "What level of prose sophistication should the output target?"
    - "This directly controls writing complexity, psychological depth, and literary ambition in all generated prose."
  default: "literary"
  result: "{value}"
  single-select:
    - value: "accessible"
      label: "Accessible - Clear, direct prose. Prioritize readability and pace. (YA, commercial thriller, genre fiction)"
    - value: "polished"
      label: "Polished - Confident, layered prose. Subtext in dialogue, varied rhythm. (Mainstream literary, upmarket commercial)"
    - value: "literary"
      label: "Literary - Rich, complex prose. Psychological depth, thematic resonance, nuanced character interiority. (Literary fiction, award-contending)"
    - value: "experimental"
      label: "Experimental - Push boundaries. Unconventional structure, language as texture, ambiguity as tool. (Avant-garde, literary experimental)"

writing_goals:
  prompt: "What are your primary writing goals for this project?"
  default: "complete_manuscript"
  result: "{value}"
  multi-select:
    - value: "complete_manuscript"
      label: "Complete a finished manuscript"
    - value: "improve_craft"
      label: "Improve writing craft and skills"
    - value: "traditional_publishing"
      label: "Pursue traditional publishing"
    - value: "self_publishing"
      label: "Self-publish the work"
    - value: "personal_satisfaction"
      label: "Personal creative fulfillment"
    - value: "build_platform"
      label: "Build author platform and audience"
    - value: "contest_submission"
      label: "Submit to contests or competitions"

agents:
  # Story Development
  - story-architect.agent.yaml
  - character-developer.agent.yaml
  - world-builder.agent.yaml
  # Writing Production
  - ghost-writer.agent.yaml
  - narrative-enrichment.agent.yaml
  # Review & Editing
  - story-reviewer.agent.yaml
  - developmental-editor.agent.yaml
  - line-editor.agent.yaml
  - copy-editor.agent.yaml
  # Publishing
  - publishing-strategist.agent.yaml
  # Screenwriting
  - screenwriter.agent.yaml
  # Musical Theatre
  - musical-theatre-book-writer.agent.yaml
  - musical-theatre-lyricist.agent.yaml
